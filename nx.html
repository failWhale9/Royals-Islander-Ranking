function showUnreleased() {
    const sel = document.getElementById('catSelect');
    const relBox = document.getElementById('relBox');
    sel.value = 'all';

    if(relBox.checked) {
        const opt1 = sel.querySelector(`option[value="${'dupe'}"]`);
        const opt2 = sel.querySelector(`option[value="${'unrel'}"]`);
        if (opt1) {opt1.remove();}
        if (opt2) {opt2.remove();}
    }
    else {
        let opt1 = document.createElement('option');
        let opt2 = document.createElement('option');
        opt1.value = "dupe";
        opt1.innerHTML = "Duplicate Entry";
        opt2.value = "unrel";
        opt2.innerHTML = "Unreleased";
        sel.appendChild(opt1);
        sel.appendChild(opt2);
    }

    sel.dispatchEvent(new Event('change', {'bubbles': true }));

}

// Function to convert BBcode links to <a> links
function bbcodeToHtml(str) {
  if (!str) return '';

  return str.replace(
    /\[URL=(https?:\/\/[^\]]+|\bwww\.[^\]]+)\](.*?)\[\/URL\]/gi,
    (match, url, text) => {
      // Ensure protocol
      if (!/^https?:\/\//i.test(url)) {
        url = 'https://' + url;
      }
      return `<a href="${url}" target="_blank" rel="noopener noreferrer">${text}</a>`;
    }
  );
}


function getGender(genID) {
    if(genID == 0) {
        return("Male Only")
    }
    else if(genID == 1) {
        return("Female Only")
    }
    else {
        return("Male or Female")
    }
}

// Function to create and populate the table
function createTable(jsons) {
    data = jsons[0];

    $.fn.DataTable.ext.pager.numbers_length = 7;
    const container = document.getElementById('table-container');
    const table = document.createElement('table');
    table.id = "myTable";
    table.classList.add('display');
    table.classList.add('mainTable');

    // Sort table by name descending
    data.sort((a, b) => {
        const valA = a["name"];
        const valB = b["name"];
        return valB - valA;
    });

    // Create table headers
    const thead = document.createElement('thead');
    const headerRow = document.createElement('tr');
    const headers = ["name","icon","image","Slot","Price","note","Category"];
    
    headers.forEach(header => {
            const th = document.createElement('th');
            th.textContent = header.charAt(0).toUpperCase() + header.slice(1);
            th.classList.add(header);
            headerRow.appendChild(th);
    });


    thead.appendChild(headerRow);
    table.appendChild(thead);
    
    // Create table body
    const tbody = document.createElement('tbody');

    data.forEach(item => {

        const row = document.createElement('tr');
        
        headers.forEach(header => {
            const td = document.createElement('td');
            td.classList.add(header);

            switch (header) {
                case "icon":
                    const img = document.createElement('img');
                    const id = item['ID'].toString();
                    img.loading = "lazy";
                    img.src = `/nx/icon/${id}.png`;
                    img.classList.add("portrait");

                    // Apply tooltip
                    const div = document.createElement('div');
                    const desc = 'data-desc';
                    const title = 'data-title';
                    const imgid = 'data-id';
                    const gender = 'data-gender';
                    div.classList.add("IconContainer");
                    div.setAttribute(desc, item['desc']);         
                    div.setAttribute(title, item['name']);    
                    div.setAttribute(imgid, item['ID']);
                    div.setAttribute(gender,getGender(item['gender']));
                    div.appendChild(img);
                    td.appendChild(div);
                    td.appendChild(div);
                    row.appendChild(td);
                    break;
                
                case "Slot":
                    const pslot = document.createElement('p');
                    pslot.textContent = item[header];
                    pslot.classList.add("Slot");  
                    td.appendChild(pslot);    
                    row.appendChild(td);           
                    break;         
                    
                case "Price":
                    const pprice = document.createElement('p');
                    let psuffix = "";
                    if(item["Category"] == "Shop (RP)" || item["isDonor"] == 1) {psuffix = " RP";}
                    if(item["Category"] == "Shop (NX)") {psuffix = " NX";}
                    if(item["Category"] == "Token of Teamwork") {psuffix = " Tokens";}                   
                    pprice.textContent = item[header] + psuffix;
                    pprice.classList.add("Price");  
                    td.appendChild(pprice);    
                    row.appendChild(td);           
                    break;   

                case "image":
                    const img2 = document.createElement('img');
                    const id2 = item['ID'].toString();

                    img2.loading = "lazy";
                    const ext = item['ext'];
                    let srcStr = "nx/image/" + id2 + "." + ext; 

                    img2.onerror = function() {
                        img2.src = 'nx/placeholder.png';
                    };

                    img2.src = srcStr;
                    img2.classList.add("portrait");

                    img2.style.cursor = "pointer"; // show it's clickable

                    img2.onload = () => {
                        const w = img2.naturalWidth;
                        const h = img2.naturalHeight;

                        const minSize = 80;
                        const maxSize = 200;

                        // Scale UP small images
                        if (w < minSize && h < minSize) {
                            img2.style.imageRendering = "pixelated";
                            img2.style.width = (w * 2) + "px";
                            img2.style.height = (h * 2) + "px";
                        }

                        // Scale DOWN large images (preserve aspect ratio)
                        else if (w > maxSize || h > maxSize) {
                            const scale = Math.min(maxSize / w, maxSize / h);
                            img2.style.width = (w * scale) + "px";
                            img2.style.height = (h * scale) + "px";
                        }
                    };

                    // Click to view full size (lightbox)
                    img2.onclick = () => {
                        const overlay = document.createElement("div");
                        overlay.style.position = "fixed";
                        overlay.style.top = 0;
                        overlay.style.left = 0;
                        overlay.style.width = "100%";
                        overlay.style.height = "100%";
                        overlay.style.background = "rgba(0,0,0,0.8)";
                        overlay.style.display = "flex";
                        overlay.style.alignItems = "center";
                        overlay.style.justifyContent = "center";
                        overlay.style.zIndex = 9999;

                        const fullImg = document.createElement("img");
                        fullImg.src = img2.src;
                        fullImg.style.maxWidth = "95%";
                        fullImg.style.maxHeight = "95%";
                        fullImg.style.boxShadow = "0 0 20px black";

                        overlay.appendChild(fullImg);

                        // click anywhere to close
                        overlay.onclick = () => {
                            document.body.removeChild(overlay);
                        };

                        document.body.appendChild(overlay);
                    };

                    td.appendChild(img2);

                    if(item['extraImg'] == true) {
                        img3.onerror = function() 
                        {
                            img3.onerror = function() 
                            {
                                img3.src = 'nx/placeholder.png';
                            };
                        img3.src = `/nx/image/${id2}_2.gif`;
                        };

                        img3.src = `/nx/image/${id2}_2.png`;
                        td.appendChild(img3)
                    }

                    row.appendChild(td);
                    break;

                case "name":
                    const pname = document.createElement('p');
                    pname.textContent = item[header];
                    pname.classList.add("Name");  
                    td.appendChild(pname);    
                    row.appendChild(td);           
                    break;

                case "note":
                    const pnote = document.createElement('p');
                    const weps = document.createElement('p');
                    const weps_hidden = document.createElement('p');
                    const br = document.createElement('br');
                    pnote.classList.add("Note");   
                    //const html = bbcodeToHtml(item[header]);
                    pnote.innerHTML = item[header];
                    td.appendChild(pnote);    

                    if(item['Slot'] == "Weapon") {
                        if(item['weaponClass'] != "") {
                            weps_hidden.style.display = "none";
                            wclass = item['weaponClass'];
                            Object.entries(wclass).forEach(([key,value]) => {
                                swep = document.createElement('span');
                                swep.innerHTML = key;
                                    if (value == 0) {
                                        swep.classList.add("wepN");
                                    }
                                    else {
                                        swep.classList.add("wepY");
                                        weps_hidden.textContent += (key + "_YES ");
                                    }
                                    weps.appendChild(swep);
                                    if(key=="SPEAR") {weps.appendChild(br)}
                            });
                        }
                        td.appendChild(weps);
                        td.appendChild(weps_hidden);
                    }

                    if(item['setEffect'] != "") {
                        const dset = document.createElement('div');
                        const psetTitle = document.createElement('p');
                        dset.classList.add("setEffect");
                        pieces = item["setEffect"];
                        if(item["Slot"] == "Pet") {
                            psetTitle.textContent = "This pet has a set effect when active alongside:";
                        }
                        else {
                            psetTitle.textContent = "This item has a set effect when worn with:";
                        }
                        dset.appendChild(psetTitle);

                        Object.entries(pieces).forEach(([key,value]) => {
                            const lpiece = document.createElement('li');
                            lpiece.textContent = value;
                            dset.appendChild(lpiece);
                        });
                        td.appendChild(dset);
                    }

                    row.appendChild(td);               
                    break;
                case "Category":
                    if(item[header] === null) {
                        break;
                    }
                    const pcat = document.createElement('div');
                    const ptrade = document.createElement('p');
                    if(item['tradeBlock'] == 1) {
                        ptrade.classList.add("Untradable")
                        ptrade.textContent = "Untradable";
                    }
                    if(item['tradeBlock'] == 0 || item['tradeBlock'] == "" ) {
                        ptrade.classList.add("Tradable")

                    }

                    pcat.appendChild(ptrade)

                    tag.classList.add(item[header].replace(/\s/g, ''));
                    pcat.appendChild(tag);

function applyBadgeTooltips() {
    const tooltip = document.getElementById('sharedTooltip');
    const tooltiptitle = document.getElementById('tooltipTitle');
    const tooltipdesc = document.getElementById('tooltipDesc');
    const tooltipid = document.getElementById('tooltipID');
    const tooltipgend = document.getElementById('tooltipGender');
    const tooltipimg = document.getElementById('tooltipImg');
    const iconContainers = document.querySelectorAll('.IconContainer');

    iconContainers.forEach(container => {
        container.addEventListener('mouseenter', () => {
            const rect = container.getBoundingClientRect();
            tooltip.style.top = `${rect.bottom + 8}px`;
            tooltip.style.left = `${rect.left}px`;
            tooltipdesc.textContent = container.dataset.desc;
            tooltiptitle.textContent = container.dataset.title;
            tooltipid.textContent = "ID: " + container.dataset.id;
            tooltipgend.textContent = container.dataset.gender;
            tooltipimg.src = `/nx/icon/${container.dataset.id}.png`;
            void tooltip.offsetWidth;
            tooltip.classList.add('visible');
        });

        container.addEventListener('mouseleave', () => {
        tooltip.classList.remove('visible');
        });
    });
}
