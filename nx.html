<script>

function showUnreleased() {
    const sel = document.getElementById('catSelect');
    const relBox = document.getElementById('relBox');
    sel.value = 'all';

    if(relBox.checked) {
        const opt1 = sel.querySelector(`option[value="${'dupe'}"]`);
        const opt2 = sel.querySelector(`option[value="${'unrel'}"]`);
        if (opt1) {opt1.remove();}
        if (opt2) {opt2.remove();}
    }
    else {
        let opt1 = document.createElement('option');
        let opt2 = document.createElement('option');
        opt1.value = "dupe";
        opt1.innerHTML = "Duplicate Entry";
        opt2.value = "unrel";
        opt2.innerHTML = "Unreleased";
        sel.appendChild(opt1);
        sel.appendChild(opt2);
    }

    sel.dispatchEvent(new Event('change', {'bubbles': true }));

}

        case "rp": {

            break;

// Function to convert BBcode links to <a> links
function bbcodeToHtml(str) {
  if (!str) return '';

  return str.replace(
    /\[URL=(https?:\/\/[^\]]+|\bwww\.[^\]]+)\](.*?)\[\/URL\]/gi,
    (match, url, text) => {
      // Ensure protocol
      if (!/^https?:\/\//i.test(url)) {
        url = 'https://' + url;
      }
      return `<a href="${url}" target="_blank" rel="noopener noreferrer">${text}</a>`;
    }
  );
}


// Function to create and populate the table
function createTable(jsons) {
    data = jsons[0];

    $.fn.DataTable.ext.pager.numbers_length = 7;
    const container = document.getElementById('table-container');
    const table = document.createElement('table');
    table.id = "myTable";
    table.classList.add('display');
    table.classList.add('mainTable');

    // Sort table by name descending
    data.sort((a, b) => {
        const valA = a["name"];
        const valB = b["name"];
        return valB - valA;
    });

    // Create table headers
    const thead = document.createElement('thead');
    const headerRow = document.createElement('tr');
    const headers = ["name","icon","image","Slot","Price","note","Category"];
    
    headers.forEach(header => {
            const th = document.createElement('th');
            th.textContent = header.charAt(0).toUpperCase() + header.slice(1);
            th.classList.add(header);
            headerRow.appendChild(th);
    });


    thead.appendChild(headerRow);
    table.appendChild(thead);
    
    // Create table body
    const tbody = document.createElement('tbody');

    data.forEach(item => {

        const row = document.createElement('tr');
        
        headers.forEach(header => {
            const td = document.createElement('td');
            td.classList.add(header);

            switch (header) {
                case "icon":
                    const img = document.createElement('img');
                    const id = item['ID'].toString();
                    img.loading = "lazy";

                    try {
                        img.src = `/nx/icon/${id}.png`;
                    }
                    catch {
                        img.src = 'nx/placeholder.png'; // Fallback image
                    }

                    img.classList.add("portrait");

                    // Apply tooltip
                    const div = document.createElement('div');
                    const desc = 'data-desc';
                    const title = 'data-title';
                    const imgid = 'data-id';
                    div.classList.add("IconContainer");
                    div.setAttribute(desc, item['desc']);         
                    div.setAttribute(title, item['name']);    
                    div.setAttribute(imgid, item['ID']);
                    div.appendChild(img);
                    td.appendChild(div);
                    td.appendChild(div);
                    row.appendChild(td);
                    break;
                
                case "Slot":
                     const pslot = document.createElement('p');
                    pslot.textContent = item[header];
                    pslot.classList.add("Slot");  
                    td.appendChild(pslot);    
                    row.appendChild(td);           
                    break;         
                    
                case "Price":
                     const pprice = document.createElement('p');
                    pprice.textContent = item[header];
                    pprice.classList.add("Price");  
                    td.appendChild(pprice);    
                    row.appendChild(td);           
                    break;   

                case "image":
                    const img2 = document.createElement('img');
                    const img3 = document.createElement('img');
                    const id2 = item['ID'].toString();
                    const formats2 = ['png', 'gif'];
                    let formatIndex2 = 0;
                    img2.loading = "lazy";
                    img3.loading = "lazy";

                    img2.onerror = function() {
                        img2.onerror = function() 
                        {
                            img2.src = 'nx/placeholder.png';
                        };
                        img2.src = `/nx/image/${id2}.gif`;
                    };

                    img2.src = `/nx/image/${id2}.png`;

                    img2.classList.add("portrait");
                    td.appendChild(img2);

                    if(item['extraImg'] == true) {
                        img3.onerror = function() 
                        {
                            img3.onerror = function() 
                            {
                                img3.src = 'nx/placeholder.png';
                            };
                        img3.src = `/nx/image/${id2}_2.gif`;
                        };

                        img3.src = `/nx/image/${id2}_2.png`;
                        td.appendChild(img3)
                    }

                    row.appendChild(td);
                    break;

                case "name":
                    const pname = document.createElement('p');
                    pname.textContent = item[header];
                    pname.classList.add("Name");  
                    td.appendChild(pname);    
                    row.appendChild(td);           
                    break;

                case "note":
                    const pnote = document.createElement('p');
                    pnote.classList.add("Note");   
                    //const html = bbcodeToHtml(item[header]);
                    pnote.innerHTML = item[header];
                    td.appendChild(pnote);    
                    row.appendChild(td);               
                    break;

                case "Category":
                    if(item[header] === null) {
                        break;
                    }
                    const pcat = document.createElement('div');
                    const ptrade = document.createElement('p');
                    if(item['tradeBlock'] == 1) {
                        ptrade.classList.add("Untradable")
                        ptrade.textContent = "Untradable";
                    }
                    if(item['tradeBlock'] == 0 || item['tradeBlock'] == "" ) {
                        ptrade.classList.add("Tradable")
                        ptrade.textContent = "Tradable";
                    }

                    pcat.appendChild(ptrade)

                    const tag = document.createElement('p');
                    tag.textContent = item[header];
                    tag.classList.add(item[header].replace(/\s/g, ''));
                    pcat.appendChild(tag);

                    td.appendChild(pcat);    
                    row.appendChild(td);  
                    break;
                default:
            }
        });
        tbody.appendChild(row);
    });

    

    table.appendChild(tbody);
    container.appendChild(table);

     $('#myTable').DataTable({
        pageLength: 20,
        pagingType: 'numbers',
        layout: {
            topStart:'search',
            topEnd:'paging',
            bottomStart:'info',
            bottomEnd:'paging'
        },
        "drawCallback": function(settings) {
            applyBadgeTooltips();
        }
     });
    const table2 = $('#myTable').DataTable();
     table2.column(5).search('^(?!.*(Unreleased|Duplicate Entry|Incomplete Entry)).*$',true,false).draw();
}

// NX Tooltip code
function applyBadgeTooltips() {
    const tooltip = document.getElementById('sharedTooltip');
    const tooltiptitle = document.getElementById('tooltipTitle');
    const tooltipdesc = document.getElementById('tooltipDesc');
    const tooltipid = document.getElementById('tooltipID');
    const tooltipimg = document.getElementById('tooltipImg');
    const iconContainers = document.querySelectorAll('.IconContainer');

    iconContainers.forEach(container => {
        container.addEventListener('mouseenter', () => {
            const rect = container.getBoundingClientRect();
            tooltip.style.top = `${rect.bottom + 8}px`;
            tooltip.style.left = `${rect.left}px`;
            tooltipdesc.textContent = container.dataset.desc;
            tooltiptitle.textContent = container.dataset.title;
            tooltipid.textContent = "ID: " + container.dataset.id;
            tooltipimg.src = `/nx/icon/${container.dataset.id}.png`;
            void tooltip.offsetWidth;
            tooltip.classList.add('visible');
        });

        container.addEventListener('mouseleave', () => {
        tooltip.classList.remove('visible');
        });
    });
}

// Load json code
async function getJsonData() {
    const jsons = ["nx.json"];
    const reqs = jsons.map(u=>fetch(u).then(response => {
    if(!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
    }
    return response.json();
    })
    );

    const results = await Promise.all(reqs);

    createTable(results);
}

getJsonData();
